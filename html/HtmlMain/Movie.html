    <div class="modal-overlay" id="codeModal">
        <div class="modal-content code-modal">
            <h2>Room Code</h2>
            <p id="codeInfo">Enter your code to join the room</p>
            <input type="text" id="codeInput" placeholder="Enter 4-digit code" maxlength="4" class="code-input">
            <div class="modal-buttons">
                <button id="btnEnterCode" class="btn-yes">Enter Room</button>
                <button id="btnGenerateCode" class="btn-no">Generate New Code</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="deleteModal">
        <div class="modal-content">
            <p>Are you sure you want to delete this video for both of you?</p>
            <div class="modal-buttons">
                <button id="btnConfirmDelete" class="btn-yes">Yes, Delete</button>
                <button id="btnCancelDelete" class="btn-no">Cancel</button>
            </div>
        </div>
    </div>

        <iframe src="telegram-chat.html" class="if-chat"></iframe>
